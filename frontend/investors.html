<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wealthified – Investor Directory. Browse all investors, their total investments, NAV units and fund count.">
    <title>Wealthified — Investor Directory</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/tables.css">
</head>
<body>
<div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <div class="logo-icon">W</div>
                <span class="logo-text">Wealthified</span>
            </div>
        </div>
        <nav class="sidebar-menu">
            <a href="index.html" class="sidebar-nav-item" id="nav_dashboard">
                <i data-lucide="layout-dashboard"></i>
                <span class="sidebar-nav-text">Dashboard</span>
            </a>
            <a href="transactions.html" class="sidebar-nav-item" id="nav_transactions">
                <i data-lucide="arrow-left-right"></i>
                <span class="sidebar-nav-text">Transactions</span>
            </a>
            <a href="investors.html" class="sidebar-nav-item active" id="nav_investors">
                <i data-lucide="users"></i>
                <span class="sidebar-nav-text">Investors</span>
            </a>
            <a href="funds.html" class="sidebar-nav-item" id="nav_funds">
                <i data-lucide="landmark"></i>
                <span class="sidebar-nav-text">Mutual Funds</span>
            </a>
            <a href="analytics.html" class="sidebar-nav-item" id="nav_analytics">
                <i data-lucide="bar-chart-3"></i>
                <span class="sidebar-nav-text">Analytics</span>
            </a>
            <a href="add-investor.html" class="sidebar-nav-item" id="nav_add_investor">
                <i data-lucide="user-plus"></i>
                <span class="sidebar-nav-text">Add Transaction</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="sidebar-nav-item" id="nav_settings">
                <i data-lucide="settings"></i>
                <span class="sidebar-nav-text">Setting</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="top-nav">
            <div class="top-nav-left">
                <h1>Investor Directory</h1>
            </div>
            <div class="top-nav-right">
                <span id="filter_validation" class="validation-error-alert hidden"></span>
                <div class="filter-input-group">
                    <label for="from_date">From</label>
                    <input type="date" id="from_date" name="from_date">
                </div>
                <div class="filter-input-group">
                    <label for="to_date">To</label>
                    <input type="date" id="to_date" name="to_date">
                </div>
                <button id="apply_filter" class="btn btn-primary">
                    <i data-lucide="filter"></i> Apply
                </button>
                <button id="clear_filter" class="btn btn-secondary">
                    <i data-lucide="rotate-ccw"></i> Reset
                </button>
                <button id="btn_export_investors" class="btn btn-secondary">
                    <i data-lucide="download"></i> Export CSV
                </button>
            </div>
        </header>

        <div class="view-wrapper fade-in">

            <!-- Table toolbar -->
            <div class="table-toolbar">
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search_investors" placeholder="Search by name or PAN...">
                </div>
                <span id="investors_count" style="font-size:12px;color:var(--text-secondary);margin-left:auto;padding-right:8px;"></span>
            </div>

            <!-- Table -->
            <div class="table-responsive-container">
                <table class="table-custom">
                    <thead>
                        <tr>
                            <th class="sortable" data-col="investor_name">Investor Name <i>&#8597;</i></th>
                            <th class="sortable" data-col="pan_number">PAN Number <i>&#8597;</i></th>
                            <th class="sortable text-right" data-col="total_amount_invested">Total Invested <i>&#8597;</i></th>
                            <th class="sortable text-right" data-col="total_nav_units">Total NAV Units <i>&#8597;</i></th>
                            <th class="sortable text-center" data-col="number_of_funds">Funds <i>&#8597;</i></th>
                            <th class="sortable text-center" data-col="latest_transaction_date">Last Transaction <i>&#8597;</i></th>
                        </tr>
                    </thead>
                    <tbody id="tbl_investors">
                        <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-secondary);">Loading investors...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination-wrapper">
                <div class="pagination-info" id="inv_pagination_info"></div>
                <div class="pagination-controls" id="inv_pagination_controls"></div>
            </div>

        </div>
    </main>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
