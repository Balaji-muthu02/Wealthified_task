<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealthified — Record Mutual Fund Transaction</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/tables.css">
</head>
<body>

    <div class="app-container">
        
        <!-- SIDEBAR CONTAINER -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-icon">W</div>
                    <span class="logo-text">Wealthified</span>
                </div>
            </div>
            
            <nav class="sidebar-menu">
                <a href="index.html" class="sidebar-nav-item" id="nav_dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span class="sidebar-nav-text">Dashboard</span>
                </a>
                <a href="transactions.html" class="sidebar-nav-item" id="nav_transactions">
                    <i data-lucide="arrow-left-right"></i>
                    <span class="sidebar-nav-text">Transactions</span>
                </a>
                <a href="investors.html" class="sidebar-nav-item" id="nav_investors">
                    <i data-lucide="users"></i>
                    <span class="sidebar-nav-text">Investors</span>
                </a>
                <a href="funds.html" class="sidebar-nav-item" id="nav_funds">
                    <i data-lucide="landmark"></i>
                    <span class="sidebar-nav-text">Mutual Funds</span>
                </a>
                <a href="analytics.html" class="sidebar-nav-item" id="nav_analytics">
                    <i data-lucide="bar-chart-3"></i>
                    <span class="sidebar-nav-text">Analytics</span>
                </a>
                <a href="add-transaction.html" class="sidebar-nav-item active" id="nav_add_investor">
                    <i data-lucide="user-plus"></i>
                    <span class="sidebar-nav-text">Add Transaction</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-nav-item" id="nav_settings">
                    <i data-lucide="settings"></i>
                    <span class="sidebar-nav-text">Setting</span>
                </a>
            </div>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="main-content">
            
            <header class="top-nav">
                <div class="top-nav-left">
                    <h1>Record Transaction</h1>
                </div>
            </header>

            <!-- WORKSPACE PANEL VIEW -->
            <div class="view-wrapper fade-in">
                
                <div class="form-card">
                    <div class="dashboard-header" style="margin-bottom: 28px;">
                        <h2>Mutual Fund Transaction Form</h2>
                        <p style="margin-top: 4px;">Record a new purchase entry. All fields are required except NAV Price (which will auto-calculate).</p>
                    </div>

                    <form id="frm_add_txn" novalidate>
                        
                        <div class="form-group-grid">
                            <!-- Name field -->
                            <div class="form-group form-group-full">
                                <label for="investor_name">Investor Name</label>
                                <input type="text" id="investor_name" class="form-control" placeholder="Enter investor's full name">
                                <span id="err_investor_name" class="form-error hidden"></span>
                            </div>

                            <!-- PAN field -->
                            <div class="form-group">
                                <label for="pan_number">PAN Number</label>
                                <input type="text" id="pan_number" class="form-control" placeholder="E.g. ABCDE1234F" style="text-transform: uppercase;">
                                <span id="err_pan_number" class="form-error hidden"></span>
                            </div>

                            <!-- Scheme field -->
                            <div class="form-group">
                                <label for="mutual_fund_name">Mutual Fund Scheme</label>
                                <input type="text" id="mutual_fund_name" class="form-control" placeholder="E.g. Axis Small Cap Fund">
                                <span id="err_mutual_fund_name" class="form-error hidden"></span>
                            </div>

                            <!-- Date field -->
                            <div class="form-group">
                                <label for="transaction_date">Transaction Date</label>
                                <input type="date" id="transaction_date" class="form-control">
                                <span id="err_transaction_date" class="form-error hidden"></span>
                            </div>

                            <!-- Amount field -->
                            <div class="form-group">
                                <label for="purchase_amount">Purchase Amount (₹)</label>
                                <input type="number" step="0.01" id="purchase_amount" class="form-control" placeholder="E.g. 50000.00">
                                <span id="err_purchase_amount" class="form-error hidden"></span>
                            </div>

                            <!-- Units field -->
                            <div class="form-group">
                                <label for="nav_units">NAV Units Purchased</label>
                                <input type="number" step="0.0001" id="nav_units" class="form-control" placeholder="E.g. 415.1120">
                                <span id="err_nav_units" class="form-error hidden"></span>
                            </div>

                            <!-- Price field -->
                            <div class="form-group">
                                <label for="nav_price">Calculated NAV Price (₹)</label>
                                <input type="text" id="nav_price" class="form-control" placeholder="Autocalculated (Amount / Units)" readonly style="background: var(--border-color); cursor: not-allowed;">
                            </div>
                        </div>

                        <!-- Action Submit -->
                        <div style="display: flex; justify-content: flex-end; border-top: 1px solid var(--border-color); padding-top: 24px;">
                            <button type="submit" class="btn btn-primary" style="padding: 12px 28px; font-size: 14px;">
                                Create Transaction
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module" src="js/app.js"></script>

</body>
</html>
